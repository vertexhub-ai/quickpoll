apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: quickpoll
  namespace: quickpoll
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
  hostnames: ["quickpoll.vertexhub.ai"]
  rules:
    - matches: [{path: {type: PathPrefix, value: /}}]
      backendRefs: [{name: quickpoll, port: 80}]
